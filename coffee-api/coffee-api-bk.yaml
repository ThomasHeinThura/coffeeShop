apiVersion: apps/v1
kind: Deployment
metadata:
  name: coffee-api
  namespace: coffee
  labels:
    app: coffee-api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: coffee-api
  template:
    metadata:
      labels:
        app: coffee-api
    spec:
      containers:
        - name: coffee-api
          image: bimdevops/bim-coffee-shop:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          # optional: simple liveness/readiness probes
          readinessProbe:
            httpGet:
              path: /coffee/hot
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /coffee/hot
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: coffee-api
  namespace: coffee
  labels:
    app: coffee-api
spec:
  type: ClusterIP
  selector:
    app: coffee-api
  ports:
    - name: http
      port: 80
      targetPort: 3000
