---
# ───────────────────────────────────────────────────────────────────
# Deployment
# ───────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coffee-ui
  namespace: coffee
  labels:
    app: coffee-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: coffee-ui
  template:
    metadata:
      labels:
        app: coffee-ui
    spec:
      containers:
        - name: coffee-ui
          # replace with your actual image registry/path
          image: bimdevops/bim-coffee-shop:1.0.0-ft
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
# ───────────────────────────────────────────────────────────────────
# Service
# ───────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: coffee-ui
  namespace: coffee
spec:
  type: ClusterIP
  selector:
    app: coffee-ui
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
---
# ───────────────────────────────────────────────────────────────────
# Ingress (NGINX)
# ───────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: coffee-ui-ingress
  namespace: coffee
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - coffee.bimats.com
      secretName: bimats-wild-ssl-secret
  rules:
    - host: coffee.bimats.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: coffee-ui
                port:
                  number: 80
